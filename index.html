<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Shirt Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF7F2;
      --ink: #1C1A17;
      --ink-soft: #4A4640;
      --ink-muted: #9A948C;
      --rust: #C4501A;
      --rust-light: #F2E8E1;
      --green: #2D6A4F;
      --green-light: #E8F3ED;
      --border: #E2DDD7;
      --card: #FFFFFF;
      --shadow: 0 2px 16px rgba(28,26,23,0.07);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 3.5rem 1.5rem 2.5rem;
      position: relative;
    }
    header::after {
      content: '';
      display: block;
      width: 48px;
      height: 2px;
      background: var(--rust);
      margin: 1.5rem auto 0;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 0.75rem;
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
      color: var(--ink);
    }
    h1 em {
      font-style: italic;
      color: var(--rust);
    }
    .header-sub {
      margin-top: 0.75rem;
      font-size: 15px;
      color: var(--ink-soft);
      max-width: 380px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }

    /* ── Layout ── */
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 1.25rem 4rem;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      box-shadow: var(--shadow);
    }

    /* ── Fields ── */
    .field-group { margin-bottom: 1.5rem; }
    label.field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.5rem;
    }
    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--cream);
      color: var(--ink);
      transition: border-color 0.15s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--ink);
    }

    /* ── Size sections ── */
    .size-section { margin-bottom: 1.5rem; }
    .size-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.75rem;
    }
    .size-section-header span {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .size-section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .size-row {
      display: flex;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #F4F1EC;
    }
    .size-row:last-child { border-bottom: none; }
    .size-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      width: 90px;
      flex-shrink: 0;
    }
    .add-btn {
      padding: 5px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-btn:hover { border-color: var(--ink); color: var(--ink); }
    .add-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--cream);
    }
    .qty-wrap {
      display: none;
      align-items: center;
      gap: 8px;
      margin-left: 10px;
    }
    .qty-wrap.visible { display: flex; }
    .qty-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--ink);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
      font-family: 'DM Sans', sans-serif;
    }
    .qty-btn:hover { border-color: var(--ink); background: var(--ink); color: var(--cream); }
    .qty-display {
      font-size: 15px;
      font-weight: 600;
      min-width: 18px;
      text-align: center;
      color: var(--ink);
    }

    /* ── Submit ── */
    .submit-btn {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s, transform 0.1s;
    }
    .submit-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── States ── */
    .state-msg {
      display: none;
      margin-top: 1rem;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.4;
      text-align: center;
    }
    .state-msg.success {
      background: var(--green-light);
      color: var(--green);
      display: block;
    }
    .state-msg.error {
      background: #FBE8E8;
      color: #8B2020;
      display: block;
    }
    .state-msg.loading {
      background: var(--rust-light);
      color: var(--rust);
      display: block;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 12px;
      color: var(--ink-muted);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.4s ease both; }

    @media (max-width: 480px) {
      header { padding: 2.5rem 1.25rem 2rem; }
      .card { padding: 1.25rem; }
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Family Order</p>
    <h1>Shirt Size <em>Survey</em></h1>
    <p class="header-sub">Select your sizes below — you can request multiple shirts or quantities. We'll take care of the rest!</p>
  </header>

  <main>
    <div class="card">
      <div class="field-group">
        <label class="field-label" for="member-name">Your Name</label>
        <input type="text" id="member-name" placeholder="e.g. Sarah" autocomplete="given-name" />
      </div>

      <!-- Adult -->
      <div class="size-section">
        <div class="size-section-header"><span>Adult</span></div>
        <div id="adult-sizes"></div>
      </div>

      <!-- Youth -->
      <div class="size-section">
        <div class="size-section-header"><span>Youth</span></div>
        <div id="youth-sizes"></div>
      </div>

      <!-- Toddler -->
      <div class="size-section">
        <div class="size-section-header"><span>Toddler</span></div>
        <div id="toddler-sizes"></div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitForm()">Submit My Sizes →</button>
      <div class="state-msg" id="state-msg"></div>
    </div>
  </main>

  <footer>Family shirt order · Submissions go directly to the organizer</footer>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzQQGW6zAI5hxpWLvVlB09Cyf0zIuruuuRq_BJMIGlvujzZVw4b4fAw4CKjPfqJgKOk/exec';

    const SIZES = {
      adult:   ['S','M','L','XL','2XL','3XL','4XL'],
      youth:   ['YXS','YS','YM','YL','YXL'],
      toddler: ['2T','3T','4T','5T']
    };

    const ALL_SIZES = [...SIZES.adult, ...SIZES.youth, ...SIZES.toddler];
    let selections = {};

    function buildSizes(list, containerId) {
      const container = document.getElementById(containerId);
      list.forEach(size => {
        const id = size.replace(/[^a-zA-Z0-9]/g, '-');
        const row = document.createElement('div');
        row.className = 'size-row';
        row.innerHTML = `
          <span class="size-name">${size}</span>
          <button class="add-btn" id="btn-${id}" onclick="toggleSize('${size}')">+ Add</button>
          <div class="qty-wrap" id="qty-${id}">
            <button class="qty-btn" onclick="changeQty('${size}', -1)">−</button>
            <span class="qty-display" id="num-${id}">1</span>
            <button class="qty-btn" onclick="changeQty('${size}', 1)">+</button>
          </div>
        `;
        container.appendChild(row);
      });
    }

    function toggleSize(size) {
      const id = size.replace(/[^a-zA-Z0-9]/g, '-');
      const btn = document.getElementById('btn-' + id);
      const qty = document.getElementById('qty-' + id);
      if (selections[size]) {
        delete selections[size];
        btn.textContent = '+ Add';
        btn.classList.remove('active');
        qty.classList.remove('visible');
      } else {
        selections[size] = 1;
        btn.textContent = '✓ Added';
        btn.classList.add('active');
        qty.classList.add('visible');
        document.getElementById('num-' + id).textContent = '1';
      }
    }

    function changeQty(size, delta) {
      if (!selections[size]) return;
      const id = size.replace(/[^a-zA-Z0-9]/g, '-');
      selections[size] = Math.max(1, selections[size] + delta);
      document.getElementById('num-' + id).textContent = selections[size];
    }

    function setMsg(type, text) {
      const el = document.getElementById('state-msg');
      el.className = 'state-msg ' + type;
      el.textContent = text;
    }

    function clearMsg() {
      const el = document.getElementById('state-msg');
      el.className = 'state-msg';
      el.textContent = '';
    }

    function resetForm() {
      document.getElementById('member-name').value = '';
      ALL_SIZES.forEach(size => {
        const id = size.replace(/[^a-zA-Z0-9]/g, '-');
        const btn = document.getElementById('btn-' + id);
        const qty = document.getElementById('qty-' + id);
        if (btn) { btn.textContent = '+ Add'; btn.classList.remove('active'); }
        if (qty) { qty.classList.remove('visible'); }
        const num = document.getElementById('num-' + id);
        if (num) num.textContent = '1';
      });
      selections = {};
    }

    async function submitForm() {
      const name = document.getElementById('member-name').value.trim();
      if (!name) {
        document.getElementById('member-name').focus();
        setMsg('error', 'Please enter your name before submitting.');
        return;
      }
      if (Object.keys(selections).length === 0) {
        setMsg('error', 'Please select at least one size.');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      setMsg('loading', 'Submitting your order...');

      // Build a flat payload
      const payload = { name, timestamp: new Date().toISOString() };
      ALL_SIZES.forEach(s => { payload[s] = selections[s] || 0; });

      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        // no-cors means we can't read the response — assume success
        resetForm();
        setMsg('success', '🎉 Your sizes have been submitted! Thanks, ' + name + '.');
        setTimeout(clearMsg, 6000);
      } catch (err) {
        setMsg('error', 'Something went wrong. Please check your connection and try again.');
      } finally {
        btn.disabled = false;
      }
    }

    buildSizes(SIZES.adult,   'adult-sizes');
    buildSizes(SIZES.youth,   'youth-sizes');
    buildSizes(SIZES.toddler, 'toddler-sizes');
  </script>
</body>
</html>
